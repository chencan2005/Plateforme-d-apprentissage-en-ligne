server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

spring:
  config:
    import: optional:classpath:application-local.yml,optional:file:./application-local.yml
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/online_learning_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    dashscope:
      api-key: ${Api_Key:}
      chat:
        options:
          model: qwen-plus

mybatis-plus:
  configuration:
    # 本地调试可在 application-local.yml 中开启 StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret-key: ${JWT_SECRET:MySuperSecretKeyForJWT1234567890123456}
    ttl-millis: ${JWT_TTL_MILLIS:7200000}
